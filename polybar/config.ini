[colors]
# Gruvbox Material Dark Soft/Medium palette
bg     = #282828
fg     = #dfbf8e
gray   = #665c54
green  = #a9b665
yellow = #d8a657
red    = #ea6962

[bar/dwm-style]
# Standard dwm bar height is usually 18-22
width = 100%
height = 20
fixed-center = false
background = ${colors.bg}
foreground = ${colors.fg}

# Force pixelated look by disabling antialias in the font string
font-0 = "Terminus:size=10:antialias=false;2"
font-1 = "Font Awesome 6 Free Solid:size=9:antialias=false;2"
font-2 = "Font Awesome 6 Free Regular:size=9:antialias=false;2"
font-3 = "Font Awesome 6 Brands Regular:size=9:antialias=false;2"

line-size = 2
padding-right = 1
module-margin = 0

modules-left = i3 xwindow
modules-right = pulseaudio ram-usage ram-avail monitor layout date time

[module/i3]
type = internal/i3
format = <label-state>
index-sort = true

# Focused: Warm gray background with a green line underneath
label-focused = %index%
label-focused-foreground = ${colors.fg}
label-focused-background = #32302f
label-focused-underline = ${colors.green}
label-focused-padding = 2

# Unfocused: Grayed out numbers
label-unfocused = %index%
label-unfocused-foreground = ${colors.gray}
label-unfocused-padding = 2

# Urgent: Red background
label-urgent = %index%
label-urgent-background = ${colors.red}
label-urgent-foreground = ${colors.fg}
label-urgent-padding = 2

[module/xwindow]
type = internal/xwindow
# Shows active window title, truncated at 40 chars
label = " %title:0:40:...%"
label-foreground = ${colors.gray}

[module/pulseaudio]
type = internal/pulseaudio
# 1:1 Scroll up/down logic is native. Right click to mute.
format-volume =   <label-volume>
label-volume = %percentage%%
label-muted =   Muted
label-muted-foreground = ${colors.red}

[module/ram-usage]
type = internal/memory
interval = 2
# %used% and %total% usually show MiB by default in Polybar
label = "|  %used%/%total%"

[module/ram-avail]
type = internal/memory
interval = 2
# This shows the available RAM in GiB (e.g., 6.9 Gi)
label = "|  %gb_free%"

[module/monitor]
type = custom/script
# Static 1:1 label for your monitor
exec = echo "|  HDMI-A-1 75Hz"
interval = 9999

[module/layout]
type = internal/xkeyboard
# Format: | KEYBOARD ICON us (us* for caps)
format = |  <label-layout><label-indicator>
label-layout = %layout%
label-indicator-on-capslock = "*"
label-indicator-off-capslock = 

[module/date]
type = internal/date
interval = 1
# Format: | CALENDAR ICON 2024-29-11
date = %Y-%d-%m
label = |  %date%

[module/time]
type = internal/date
interval = 1
# Format: | CLOCK ICON 01:50:05
time = %H:%M:%S
label = |  %time%

[settings]
screenchange-reload = true

